         /* CSS Variables */
         .info-box {

         border-radius: 5px; /* Rounded corners */

         .info-box h2 {
         margin: 0; /* Remove default margin */
         color: #0084ff; /* Blue text color */
         }
         

         ..corner-link-container {
         position: fixed; /* or absolute, depending on your needs */
         top: 0;
         right: 0; /* Use 'left: 0;' for the top-left corner */
         padding: 10px; /* Optional: adds some space from the corner */
         z-index: 1000; /* Optional: ensures the link is above other content */
         }
         .corner-link-container img {

         height: auto;
         border: none; /* Optional: removes default link border in some browsers */
         }
         :root {

        --link-color: #3ea6ff;

    }

         /* Dark Mode Overrides */
         @media (prefers-color-scheme: dark) {
         :root {

         --text-color: #eaeaea;
         --caption-color: #bbbbbb;
         --caption-small: #999999;
         }
         }
         body {
         margin: 0;
         font-family: Helvetica, Arial, sans-serif;
         background-color: var(--bg-color);
         color: var(--text-color);
         }
         .container {
         margin: 40px auto;
         width: 100%;
         max-width: 900px;
         padding: 0 16px;
         }
         figure {
         margin: 20px 0;
         text-align: center;
         }
         figcaption {
         color: var(--caption-color);
         font-size: 0.9rem;
         margin-top: 8px;
         }
         figcaption small {
         color: var(--caption-small);
         font-style: italic;
         }
         :root {

         }
        a {
        color: var(--link-color);
        text-decoration: none;
        transition: color 0.2s ease;
    }

    a:hover {
        color: var(--link-hover);
        text-decoration: underline;
    }
         hr {
         opacity: 0.2;
         }
