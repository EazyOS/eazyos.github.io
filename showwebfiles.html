<script>
    // --- CONFIGURATION ---
    const USERNAME = 'YOUR_GITHUB_USERNAME'; 
    const REPO = 'YOUR_REPO_NAME';
    const BRANCH = 'main'; 
    // ---------------------

    const browserEl = document.getElementById('browser');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error-message');
    const contentEl = document.getElementById('file-content');
    const headerEl = document.getElementById('viewer-header');
    const placeholderEl = document.getElementById('viewer-placeholder');

    async function fetchRepoContents() {
        const url = `https://api.github.com/repos/${USERNAME}/${REPO}/git/trees/${BRANCH}?recursive=1`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`GitHub API error: ${response.status}`);
            
            const data = await response.json();
            loadingEl.style.display = 'none';

            // Sort: Folders first, then files
            const items = data.tree.sort((a, b) => {
                if (a.type === b.type) return a.path.localeCompare(b.path);
                return a.type === 'tree' ? -1 : 1;
            });

            // Clear browser list just in case of double-renders
            browserEl.innerHTML = '';

            items.forEach(item => {
                // Create a standalone variable for this iteration's path to prevent closure leaks
                const currentPath = item.path;
                const isDir = item.type === 'tree';

                const li = document.createElement('li');
                li.className = 'item';
                li.innerHTML = `
                    <span class="icon">${isDir ? '📁' : '📄'}</span>
                    <span class="${isDir ? 'dir' : 'file'}">${currentPath}</span>
                `;

                // Handle clicks using the isolated currentPath variable
                if (isDir) {
                    li.addEventListener('click', (e) => {
                        e.preventDefault();
                        window.open(`https://github.com/${USERNAME}/${REPO}/tree/${BRANCH}/${currentPath}`, '_blank');
                    });
                } else {
                    li.addEventListener('click', (e) => {
                        e.preventDefault();
                        viewFile(currentPath);
                    });
                }
                
                browserEl.appendChild(li);
            });

        } catch (error) {
            loadingEl.style.display = 'none';
            showError(`Failed to load directory: ${error.message}`);
        }
    }

    async function viewFile(path) {
        // Immediately hide old content and show loading indicator for the new file
        placeholderEl.style.display = 'none';
        contentEl.style.display = 'none';
        contentEl.textContent = ''; 
        headerEl.textContent = `📄 Loading: ${path}...`;

        // Adding a cache-busting timestamp query parameter (?t=...) ensures 
        // the browser fetches the actual file clicked, rather than a cached version of a previous file.
        const rawFileUrl = `https://${USERNAME}.github.io/${REPO}/${path}?t=${new Date().getTime()}`;

        try {
            const response = await fetch(rawFileUrl);
            if (!response.ok) throw new Error(`Could not read file (Status ${response.status})`);
            
            const text = await response.text();
            
            headerEl.textContent = `📄 Viewing: ${path}`;
            contentEl.textContent = text; // textContent safely escapes HTML codes
            contentEl.style.display = 'block';
        } catch (error) {
            headerEl.textContent = `❌ Error`;
            contentEl.textContent = `Error loading [${path}].\n\nDetails: ${error.message}`;
            contentEl.style.display = 'block';
        }
    }

    function showError(msg) {
        errorEl.textContent = msg;
        errorEl.style.display = 'block';
    }

    // Initialize setup check
    if(USERNAME === 'YOUR_GITHUB_USERNAME') {
        loadingEl.style.display = 'none';
        showError('Please update the USERNAME and REPO constants inside the <script> tag.');
    } else {
        fetchRepoContents();
    }
</script>
