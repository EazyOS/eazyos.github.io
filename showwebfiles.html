<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Directory</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f6f8fa;
            color: #24292f;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            border-bottom: 1px solid #d0d7de;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .container {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0; /* Crucial for nested scrolling */
        }
        .panel {
            background: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 15px;
            overflow-y: auto;
        }
        #left-panel {
            flex: 1;
            max-width: 400px;
        }
        #right-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
        }
        .file-list {
            list-style: none;
            padding-left: 0;
            margin: 0;
        }
        .item {
            display: flex;
            align-items: center;
            padding: 8px 6px;
            border-bottom: 1px solid #f0f2f4;
            cursor: pointer;
            border-radius: 4px;
        }
        .item:hover {
            background-color: #f3f4f6;
        }
        .icon { margin-right: 10px; }
        .dir { font-weight: bold; color: #0969da; }
        .file { color: #24292f; }
        
        /* Viewer Styles */
        #viewer-header {
            font-weight: bold;
            padding-bottom: 10px;
            border-bottom: 1px solid #d0d7de;
            margin-bottom: 10px;
        }
        #file-content {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            font-size: 14px;
            background: #f6f8fa;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #d0d7de;
            flex: 1;
            overflow-y: auto;
        }
        .error { color: #cf222e; background: #ffebe9; padding: 10px; border-radius: 6px; margin-bottom: 10px;}
        .placeholder { color: #57606a; font-style: italic; text-align: center; margin-top: 40px; }
    </style>
</head>
<body>

    <h1>📁 Website Directory</h1>
    
    <div id="error-message" class="error" style="display: none;"></div>

    <div class="container">
        <div id="left-panel" class="panel">
            <div id="loading">Loading repository structure...</div>
            <ul id="browser" class="file-list"></ul>
        </div>

        <div id="right-panel" class="panel">
            <div id="viewer-header">File Viewer</div>
            <div id="viewer-body" style="display: flex; flex-direction: column; flex: 1;">
                <p class="placeholder" id="viewer-placeholder">Select a text-based file from the left to view its contents.</p>
                <pre id="file-content" style="display: none;"></pre>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const USERNAME = 'YOUR_GITHUB_USERNAME'; 
        const REPO = 'YOUR_REPO_NAME';
        const BRANCH = 'main'; 
        // ---------------------

        const browserEl = document.getElementById('browser');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error-message');
        const contentEl = document.getElementById('file-content');
        const headerEl = document.getElementById('viewer-header');
        const placeholderEl = document.getElementById('viewer-placeholder');

        async function fetchRepoContents() {
            const url = `https://api.github.com/repos/${USERNAME}/${REPO}/git/trees/${BRANCH}?recursive=1`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`GitHub API error: ${response.status}`);
                
                const data = await response.json();
                loadingEl.style.display = 'none';

                // Sort: Folders first, then files
                const items = data.tree.sort((a, b) => {
                    if (a.type === b.type) return a.path.localeCompare(b.path);
                    return a.type === 'tree' ? -1 : 1;
                });

                items.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'item';
                    
                    const isDir = item.type === 'tree';
                    li.innerHTML = `
                        <span class="icon">${isDir ? '📁' : '📄'}</span>
                        <span class="${isDir ? 'dir' : 'file'}">${item.path}</span>
                    `;

                    // Handle clicks
                    if (isDir) {
                        // For folders, we'll just let them open the folder on GitHub in a new tab
                        li.addEventListener('click', () => {
                            window.open(`https://github.com/${USERNAME}/${REPO}/tree/${BRANCH}/${item.path}`, '_blank');
                        });
                    } else {
                        // For files, trigger our internal viewer fetcher
                        li.addEventListener('click', () => viewFile(item.path));
                    }
                    
                    browserEl.appendChild(li);
                });

            } catch (error) {
                loadingEl.style.display = 'none';
                showError(`Failed to load directory: ${error.message}`);
            }
        }

        async function viewFile(path) {
            placeholderEl.style.display = 'none';
            contentEl.style.display = 'none';
            headerEl.textContent = `📄 Loading: ${path}...`;

            // We fetch the raw content directly from your GitHub Pages domain
            // This bypasses GitHub API rate limits for reading file text
            const rawFileUrl = `https://${USERNAME}.github.io/${REPO}/${path}`;

            try {
                const response = await fetch(rawFileUrl);
                if (!response.ok) throw new Error(`Could not read file (Status ${response.status})`);
                
                const text = await response.text();
                
                headerEl.textContent = `📄 Viewing: ${path}`;
                contentEl.textContent = text; // textContent handles escaping HTML safely
                contentEl.style.display = 'block';
            } catch (error) {
                headerEl.textContent = `❌ Error`;
                contentEl.textContent = `Error loading file content.\n\nNote: If this file was just pushed, GitHub Pages might take a minute to deploy it.\n\nDetails: ${error.message}`;
                contentEl.style.display = 'block';
            }
        }

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
        }

        // Initialize setup check
        if(USERNAME === 'YOUR_GITHUB_USERNAME') {
            loadingEl.style.display = 'none';
            showError('Please update the USERNAME and REPO constants inside the <script> tag.');
        } else {
            fetchRepoContents();
        }
    </script>
</body>
</html>
