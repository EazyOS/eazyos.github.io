<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repository File Browser</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            background-color: #f6f8fa;
            color: #24292f;
        }
        h1 {
            border-bottom: 1px solid #d0d7de;
            padding-bottom: 10px;
        }
        .file-list {
            list-style: none;
            padding-left: 0;
            background: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 10px;
        }
        .item {
            display: flex;
            align-items: center;
            padding: 8px 4px;
            border-bottom: 1px solid #f0f2f4;
        }
        .item:last-child {
            border-bottom: none;
        }
        .icon {
            margin-right: 10px;
            font-size: 1.1em;
        }
        .dir { font-weight: bold; color: #0969da; }
        .file { color: #24292f; }
        a { text-decoration: none; color: inherit; }
        a:hover { text-decoration: underline; }
        .error { color: #cf222e; background: #ffebe9; padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>

    <h1>📁 Repository Contents</h1>
    <div id="loading">Loading repository contents...</div>
    <div id="error-message" class="error" style="display: none;"></div>
    <ul id="browser" class="file-list" style="display: none;"></ul>

    <script>
        // --- CONFIGURATION ---
        // Replace these with your actual GitHub username and repository name
        const USERNAME = 'EazyOS'; 
        const REPO = 'eazyos.github.io';
        const BRANCH = 'main'; // Change to 'master' if needed
        // ---------------------

        async function fetchRepoContents() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error-message');
            const browserEl = document.getElementById('browser');

            // GitHub API endpoint to get the repository tree recursively
            const url = `https://api.github.com/repos/${USERNAME}/${REPO}/git/trees/${BRANCH}?recursive=1`;

            try {
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`GitHub API responded with status ${response.status}`);
                }

                const data = await response.json();
                loadingEl.style.display = 'none';
                browserEl.style.display = 'block';

                // Sort data: directories first, then files
                const items = data.tree.sort((a, b) => {
                    if (a.type === b.type) return a.path.localeCompare(b.path);
                    return a.type === 'tree' ? -1 : 1;
                });

                items.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'item';

                    const isDir = item.type === 'tree';
                    const icon = isDir ? '📁' : '📄';
                    const itemClass = isDir ? 'dir' : 'file';
                    
                    // Construct the URL to view/download the file or folder
                    const targetUrl = isDir 
                        ? `https://github.com/${USERNAME}/${REPO}/tree/${BRANCH}/${item.path}`
                        : `https://${USERNAME}.github.io/${REPO}/${item.path}`;

                    li.innerHTML = `
                        <span class="icon">${icon}</span>
                        <a href="${targetUrl}" class="${itemClass}" target="_blank">${item.path}</a>
                    `;
                    
                    browserEl.appendChild(li);
                });

            } catch (error) {
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.textContent = `Failed to load directory: ${error.message}`;
            }
        }

        // Run the function on page load
        if(USERNAME === 'YOUR_GITHUB_USERNAME') {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error-message').style.display = 'block';
            document.getElementById('error-message').textContent = 'Please update the USERNAME and REPO constants in the script tag section.';
        } else {
            fetchRepoContents();
        }
    </script>
</body>
</html>
